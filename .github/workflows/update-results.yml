name: Update WC2026 results

on:
  schedule:
    - cron: '17 7 * * *'      # daily at 07:17 UTC (after the day's matches finish in North America)
  workflow_dispatch:           # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results from ESPN and update JSON
        run: node scripts/update-results.mjs

      - name: Commit if changed
        run: |
          git config user.name "wc2026-results-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wc2026-results.json
          if git diff --staged --quiet; then
            echo "No result changes today."
          else
            git commit -m "Auto-update results ($(date -u +%Y-%m-%d))"
            git push
          fi
